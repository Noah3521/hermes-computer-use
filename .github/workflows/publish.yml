name: Publish to PyPI

# Triggers when a GitHub Release is published (including from a tag).
# Uses PyPI Trusted Publisher (OIDC) — no API tokens required.
# One-time setup on PyPI:
#   https://pypi.org/manage/account/publishing/
#   owner: Noah3521
#   repo:  hermes-computer-use
#   workflow: publish.yml
#   environment: pypi

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
